binding_version: 2

repository:
  # EN: Repository name recorded in every AI-Native run and dashboard.
  # ZH: 写入每次 AI-Native run 和仪表盘的仓库名。
  # Impact / 影响: changing this affects future run metadata only; existing runs keep their old value.
  name: __REPO_NAME__
  # EN: Default branch used for reporting and release context.
  # ZH: 用于报告和发布上下文的默认分支。
  default_branch: main
  # EN: Owning teams or reviewers. Empty is allowed.
  # ZH: 负责团队或 reviewer，可留空。
  owners: []

process_core:
  # EN: Version of ai-process-core expected by this repository.
  # ZH: 本仓库期望使用的 ai-process-core 版本。
  version: draft-v0.1.0
  # EN: standard = full lifecycle with governance gates.
  # ZH: standard = 完整生命周期和治理 gate。
  profile: standard
  # EN/ZH: Installed skill package id / 已安装 skill 包标识。
  distribution_id: ai-process-core
  # EN: false keeps one host responsible for the stage artifacts.
  # ZH: false 表示由当前宿主直接负责阶段产物。
  require_executor_handoff: false
  # EN: Runtime host used for approvals.
  # ZH: 审批交互使用的宿主。
  host: codex
  # EN: none = no required RED/GREEN/REFACTOR or DDD loop.
  # ZH: none = 不强制 TDD 或 DDD 实施循环。
  development_protocol: none

enabled_stages:
  # EN: Ordered process stages. Do not skip a stage unless the routing policy does it.
  # ZH: 有序流程阶段。除非 routing policy 自动跳过，否则不要手动跳阶段。
  - intake
  - clarify
  - security
  - spec
  - implement
  - verify
  - archive
  - learn

repo_layout:
  # EN: All paths are relative to the repository root.
  # ZH: 所有路径都相对于仓库根目录。
  package_root: ai-native
  knowledge_root: ai-native/docs/ai-index
  runtime_root: ai-native/runtime/ai-process
  skills_root: ai-native/skills

validation_entrypoints:
  # EN: Optional commands invoked by verify/gate scripts.
  # ZH: verify/gate 脚本可调用的可选命令。
  manifest_check: []
  index_refresh_check: []
  verify_checks: []

rule_files:
  # EN: Repo-specific policy override files.
  # ZH: 仓库级策略覆盖文件。
  risk_overrides: ai-native/rules/risk-overrides.yaml
  security_overrides: ai-native/rules/security/security-overrides.md

commit_policy:
  # EN: none means the user commits manually; the process still records commits when present.
  # ZH: none 表示用户手动提交；流程仍会记录已存在的提交。
  mode: none
  record_commits_as_events: true
  require_commit_for_review: false
  require_commit_for_approval: false

review_policy:
  # EN: Human review before verify is not globally required; stage gates below still apply.
  # ZH: verify 前不做全局强制人工 review；下方阶段 gate 仍然生效。
  require_human_review_before_verify: false

stage_review_policy:
  # EN: Every stage boundary requires explicit approval by default.
  # ZH: 默认每个阶段边界都需要显式审批。
  # Impact / 影响: when approval is pending, the agent must stop and may not keep editing code.
  intake:
    require_human_approval_before_advance: true
    rejection_action: stay_blocked
    max_rework_attempts: 3
  clarify:
    require_human_approval_before_advance: true
    rejection_action: rework
    max_rework_attempts: 0 # EN/ZH: unlimited rework / 无限重做
  security:
    require_human_approval_before_advance: true
    rejection_action: rework
    max_rework_attempts: 3
  spec:
    require_human_approval_before_advance: true
    rejection_action: stay_blocked
    max_rework_attempts: 3
  implement:
    require_human_approval_before_advance: true
    rejection_action: stay_blocked
    max_rework_attempts: 3
  verify:
    require_human_approval_before_advance: true
    require_commit_checkpoint: false
    rejection_action: stay_blocked
    max_rework_attempts: 3
  archive:
    require_human_approval_before_advance: true
    rejection_action: stay_blocked
    max_rework_attempts: 3
  learn:
    require_human_approval_before_advance: true
    rejection_action: stay_blocked
    max_rework_attempts: 3

complexity_routing:
  # EN: Allows intake to choose a simpler or fuller effective stage list per run.
  # ZH: 允许 intake 按本次请求复杂度选择更简单或更完整的有效阶段列表。
  # Impact / 影响: effective_enabled_stages in run-state is the source of truth after intake.
  enabled: true

openspec:
  # EN: Bridge AI-Native planning to OpenSpec artifacts.
  # ZH: 将 AI-Native 规划桥接到 OpenSpec 产物。
  enabled: true
  change_name_source: run_id_suffix
  max_change_name_length: 50
  clarify_stage:
    investigate: true
  spec_stage:
    generate_artifacts: true
    inject_security_constraints: true
  implement_stage:
    load_apply_instructions: true
    security_task_audit: true
    sync_tasks_on_complete: true
  archive_stage:
    archive_change: true
    sync_delta_specs: prompt

jira_integration:
  # EN: Enabled by default so the agent must ask whether to link/create Jira before creating a run.
  # ZH: 默认开启，因此 agent 创建 run 前必须询问关联已有 Jira、创建 Jira，还是跳过。
  enabled: true
  # EN: Project used for new Jira issues.
  # ZH: 新建 Jira issue 使用的项目 key。
  project_key: "ZOOM"
  # EN: Preferred Jira transports in order. Use DevHelper MCP first because local helper CLI may be blocked by agent sandboxes.
  # ZH: Jira 传输方式按顺序选择。优先 DevHelper MCP，因为本地 helper CLI 可能被 agent sandbox 阻断。
  transport_preference:
    - mcp
    - helper_cli
  create_issue:
    # EN/ZH: Default issue type for issues created from AI-Native intake.
    # ZH: AI-Native intake 新建 Jira 时使用的默认 issue 类型。
    issue_type: "Task"
    # EN: Summary is a single-line Jira title; the required engineering answers go into description.
    # ZH: Summary 是 Jira 单行标题；工程标准问题回答写入 description。
    summary_format: "{task_type}: {short_summary}"
    engineering_task_description:
      # EN/ZH: Include the standard engineering-driven task questions when creating Jira.
      # ZH: 新建 Jira 时包含工程驱动任务的标准问题。
      enabled: true
      # EN/ZH: Avoid Markdown headings/tables because Jira ADF may render them as nested 1./a. lists.
      # ZH: 避免 Markdown 标题/表格，防止 Jira ADF 渲染成嵌套 1./a. 列表。
      rendering: jira_safe_plain_text
      required_questions:
        - "What is the problem? State the problem you are trying to solve."
        - "What is the root cause? Describe what is the root cause of the problem."
        - "Success criteria (DoD) What are the criteria to measure the success of the solution."
        - "How does it Impacts the user experiences? If user experiences is impacted, please work with PM and review with UE/UX."
        - "Additional Information: List monitoring, logging, controls, dependencies and other related information."
    additional_properties:
      zoom_module:
        # EN/ZH: ZOOM Task required field "Zoom Module".
        field_key: "customfield_13244"
        value: "TestZoom"
      platform_os:
        # EN/ZH: ZOOM Task required field "Platform OS".
        field_key: "customfield_14917"
        # EN/ZH: Agent infers from request/repo scope; falls back to All.
        # ZH: agent 根据需求/仓库范围推断；无法判断时回退到 All。
        inference: ai
        default: "All"
        allowed_values:
          - "All"
          - "Mac"
          - "Windows"
          - "Linux"
          - "visionOS"
          - "Android"
          - "iOS"
          - "iPadOS"
      task_type:
        # EN/ZH: ZOOM Task required field "Task Type".
        field_key: "customfield_12821"
        # EN/ZH: Agent infers from request intent; falls back to Technical Enhancement.
        # ZH: agent 根据需求意图推断；无法判断时回退到 Technical Enhancement。
        inference: ai
        default: "Technical Enhancement"
        allowed_values:
          - "New Feature"
          - "UX Enhancement"
          - "Security Enhancement"
          - "Technical Enhancement"
          - "Feature Release Control"
  # EN: true means no Jira = no governed run.
  # ZH: true 表示没有 Jira 就不能开始 governed run。
  require_jira: true
  spec_writeback:
    # EN/ZH: SPEC moves Jira from In Progress to Ready for Security Review after fields are updated.
    # ZH: SPEC 字段回填成功后把 Jira 从 In Progress 流转到 Ready for Security Review。
    transition_to: "Ready for Security Review"
    # EN/ZH: ZOOM workflow transition name whose target status is Ready for Security Review.
    # ZH: ZOOM 工作流中目标状态为 Ready for Security Review 的实际 transition 名称。
    transition_name: "technical design + threat model (if applicable) ready"
    prerequisite_transition:
      # EN/ZH: If Jira is still Open, SPEC first executes the missing S1/S2 workflow move.
      # ZH: 如果 Jira 仍在 Open，SPEC 会先补执行缺失的 S1/S2 工作流流转。
      from_status: "Open"
      transition_to: "In Progress"
      transition_name: "In Progress"
    description:
      # EN/ZH: Backfill Jira Description only when the original description is too sparse.
      # ZH: 原描述过简时才回填 Jira Description。
      update_when_sparse: true
      # EN/ZH: Use plain section labels and hyphen bullets to avoid nested 1./a. Jira rendering.
      # ZH: 使用纯文本标题和 hyphen bullets，避免 Jira 渲染出嵌套 1./a.。
      rendering: jira_safe_plain_text
      sparse_if_missing:
        - owner
        - acceptance_criteria
        - scenario
    technical_design:
      # EN/ZH: ZOOM Technical Design spec is owned outside AI-Native writeback; do not modify it.
      # ZH: ZOOM Technical Design spec 字段不由 AI-Native 回填修改。
      field_key: "customfield_12712"
      field_type: "url"
      value_source: "jira_issue_url"
      template: "zoom_technical_design_spec"
      comment_contains_rendered_design: true
      update: false
    security_owner:
      # EN/ZH: Required by the ZOOM Ready for Security Review transition.
      # ZH: ZOOM 流转到 Ready for Security Review 时要求该字段。
      field_key: "customfield_12892"
      preserve_existing: true
    risk_analysis:
      # EN/ZH: Default low-risk answer; agents may override by passing explicit risk answers to writeback_jira_spec.py.
      # ZH: 默认低风险答案；Agent 可通过 writeback_jira_spec.py 显式参数覆盖。
      default_answer: "No"
      fields:
        new_personal_data:
          field_key: "customfield_15634"
          question: "Does this feature collect or process NEW personal data from individuals?"
        existing_personal_data_new_use:
          field_key: "customfield_15635"
          question: "Does this feature process Personal Data Zoom already collected for new purposes or store that data in a new logical storage location?"
        third_party_security_bypass:
          field_key: "customfield_15636"
          question: "Does this feature result in the bypass of 3rd-party security protections?"
        architecture_change:
          field_key: "customfield_15637"
          question: "Does this feature introduce significant changes to the system architecture?"
        security_controls_change:
          field_key: "customfield_15638"
          question: "Does this feature introduce significant changes to security controls or the software components?"
        ai_ml_change:
          field_key: "customfield_15639"
          question: "Does this feature introduce any significant changes to artificial intelligence (AI) or machine learning (ML) systems or features?"
        physical_features_processing:
          field_key: "customfield_15886"
          question: "Will this feature use any technology to analyze or process data associated with a user's face, hands, voice or other physical features?"
        api_or_authz_change:
          field_key: "customfield_17370"
          question: "Does this feature introduce any new API, endpoint, or changes to an existing API's auth/z or permission structure?"
        china_ai_model_reliance:
          field_key: "customfield_25604"
          question: "Does this feature directly rely on AI models developed, maintained or distributed by organizations in China, or directly include code generated using such models?"
  # EN: SPEC writeback is blocking when a Jira issue is linked; other writebacks are comments/status hints.
  # ZH: 已关联 Jira 时，SPEC 写回是阻塞项；其他写回是评论/状态提示。
  writeback:
    intake: true # EN/ZH: intent summary + In Progress transition / intent 摘要 + 尝试流转 In Progress
    spec: true # EN/ZH: Description + design + risk fields + review transition / 描述 + 设计 + 风险字段 + 审核流转
    implement: true # EN/ZH: effort estimate only / 仅写工时估算
    learn: true # EN/ZH: MR checklist + release/CC notes / MR 清单 + 发布/CC 提示
  release_policy_path: "ai-native/rules/release-policy.yaml"

stage_overrides:
  verify:
    # EN: Additional verify requirements.
    # ZH: verify 阶段的额外要求。
    additional_gates:
      - evidence_recorded
    required_artifacts:
      - verification_report
      - evidence_ledger_entry
    repo_checks: []
