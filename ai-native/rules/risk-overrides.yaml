version: 2
extends: core-risk-policy
mode: tighten_only

metadata:
  repository: skill-toggle

# ---------------------------------------------------------------------------
# protected_paths — the primary configuration surface
#
# Use glob patterns (fnmatch syntax). Examples:
#   "ops/prod/**"   matches everything under ops/prod/
#   ".env*"         matches .env, .env.local, .env.production, …
#   "migrations/**" matches all migration files
#
# Three protection levels:
#
#   require_approval  — the AI must get human sign-off before writing
#                       to any path that matches these patterns.
#                       Covers: file create, modify, delete, move, batch write.
#
#   deny              — the AI may never write to these paths at all.
#                       Used for secrets, keys, and hard-protected dirs.
#
#   batch_write_approval — bulk writes to these paths need approval even
#                          when individual writes would be allowed.
# ---------------------------------------------------------------------------

protected_paths:
  require_approval: []
  # Examples:
  #   - "ops/prod/**"
  #   - "deploy/**"
  #   - ".env*"
  #   - "config/production.*"

  deny: []
  # Examples:
  #   - "secrets/**"
  #   - "keys/**"
  #   - "*.pem"

  batch_write_approval: []
  # Examples:
  #   - "migrations/**"
  #   - "db/schema/**"

# ---------------------------------------------------------------------------
# advanced_rules — only for teams that need custom match conditions
#                  beyond simple path protection.
#
# Leave this empty unless you have a specific need that protected_paths
# cannot express. Rules added here must use the action names from the
# core action catalog (see core-process/contracts/action-library.yaml).
#
# Rules may only tighten policy (decision: approval_required or deny).
# Rules with decision: allow are rejected at validation time.
# ---------------------------------------------------------------------------

advanced_rules: []
# Example (disabled by default):
# - id: protect-ops-prod
#   match:
