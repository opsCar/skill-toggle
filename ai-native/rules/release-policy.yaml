# Repository-local release checkpoint policy for AI-Native LEARN stage.
# 中文：这是 LEARN 阶段读取的仓库本地发布窗口/CC 判断配置。
# Fill these values with the repo's real release calendar when available.
# 中文影响：留空时不会阻塞流程，只表示没有可判断的 code freeze / GO / TA / PROD 窗口。

# Affected fix versions that require extra CC attention.
# 中文影响：Jira issue 的 fixVersion 命中这里时，LEARN 阶段会提示 CC 检查。
affected_versions: []

# Release windows. Supported type examples: code_freeze, go, ta, prod.
# 中文影响：当天落在 code_freeze 窗口时，LEARN 阶段会提示需要 CC 或显式 override。
checkpoints: []

# Example:
# checkpoints:
#   - type: code_freeze
#     start: "2026-05-01"
#     end: "2026-05-10"
#     affected_versions:
#       - "6.5.0"
